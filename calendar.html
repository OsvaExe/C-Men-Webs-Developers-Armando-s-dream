<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>TaskFlow — Calendario</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="calendar.css"/>
</head>
<body>
<button class="hamburger" id="hamburger">☰</button>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><span class="logo-dot"></span>TaskFlow</div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span>Dashboard</a>
      <a href="projects.html"  class="nav-item"><span class="nav-icon">📁</span>Proyectos</a>
      <a href="kanban.html"    class="nav-item"><span class="nav-icon">📋</span>Kanban</a>
      <a href="calendar.html"  class="nav-item"><span class="nav-icon">📅</span>Calendario</a>
      <a href="stats.html"     class="nav-item"><span class="nav-icon">📊</span>Estadísticas</a>
      <div class="nav-divider"></div>
      <a href="settings.html"  class="nav-item"><span class="nav-icon">⚙️</span>Configuración</a>
    </nav>
    <div class="sidebar-bottom">
      <div id="sidebarUser"></div>
      <div class="sb-bottom-row"><span class="sidebar-version">v1.0</span><button class="theme-btn" id="themeBtn">🌙</button></div>
    </div>
  </aside>
  <div class="content">
    <header class="page-header">
      <div><h1 class="page-title">Calendario</h1><p class="page-sub">Visualiza tus tareas por fecha de entrega.</p></div>
      <div class="page-actions"><button class="btn btn-ghost" id="todayBtn">Hoy</button></div>
    </header>
    <main class="page-main">
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:rgba(107,114,144,.5)"></div>Pendiente</div>
        <div class="legend-item"><div class="legend-dot" style="background:rgba(91,106,240,.6)"></div>En Progreso</div>
        <div class="legend-item"><div class="legend-dot" style="background:rgba(126,232,162,.6)"></div>Terminado</div>
      </div>
      <div class="cal-nav">
        <button class="cal-nav-btn" id="prevMonth">◀</button>
        <div class="cal-month" id="calMonthLabel"></div>
        <button class="cal-nav-btn" id="nextMonth">▶</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="day-detail" id="dayDetail" style="display:none"></div>
    </main>
  </div>
</div>
<div id="toastWrap" class="toast-wrap"></div>
<script src="shared.js"></script>
<script>
checkAuth(); seedData(); initTheme(); initNav();

let viewDate = new Date(), selectedDay = null;

renderCalendar();

document.getElementById('prevMonth').addEventListener('click', () => { viewDate.setMonth(viewDate.getMonth()-1); renderCalendar(); });
document.getElementById('nextMonth').addEventListener('click', () => { viewDate.setMonth(viewDate.getMonth()+1); renderCalendar(); });
document.getElementById('todayBtn').addEventListener('click', () => { viewDate = new Date(); selectedDay = null; document.getElementById('dayDetail').style.display='none'; renderCalendar(); });

function renderCalendar() {
  const { tasks, projects } = loadAll();
  const year = viewDate.getFullYear(), month = viewDate.getMonth();
  const today = new Date().toISOString().slice(0,10);
  const visibleTasks = getVisibleTasks(tasks);
  document.getElementById('calMonthLabel').textContent = new Date(year,month,1).toLocaleDateString('es-MX',{month:'long',year:'numeric'});

  const firstDay = new Date(year,month,1).getDay();
  const startOffset = (firstDay===0) ? 6 : firstDay-1;
  const daysInMonth = new Date(year,month+1,0).getDate();
  const daysInPrev  = new Date(year,month,0).getDate();

  const tasksByDay = {};
  visibleTasks.forEach(t => { if (!t.dueDate) return; if (!tasksByDay[t.dueDate]) tasksByDay[t.dueDate]=[]; tasksByDay[t.dueDate].push(t); });

  const DAYS = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  let html = DAYS.map(d => `<div class="cal-day-header">${d}</div>`).join('');
  for (let i=startOffset-1; i>=0; i--) html += `<div class="cal-cell other-month"><span class="cal-day-num">${daysInPrev-i}</span></div>`;
  for (let d=1; d<=daysInMonth; d++) {
    const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT = ds===today, isSel = ds===selectedDay;
    const dayTasks = tasksByDay[ds] || [];
    const chips = dayTasks.slice(0,2).map(t => { const proj=projects.find(p=>p.id===t.projectId); return `<div class="cal-task ${t.status}" title="${escHtml(t.name)} — ${proj?.name||''}">${escHtml(t.name)}</div>`; }).join('');
    const more  = dayTasks.length>2 ? `<div class="cal-more">+${dayTasks.length-2} más</div>` : '';
    html += `<div class="cal-cell${isT||isSel?' today':''}" onclick="selectDay('${ds}')" style="cursor:pointer"><span class="cal-day-num">${d}</span>${chips}${more}</div>`;
  }
  const trail = (startOffset+daysInMonth)%7===0 ? 0 : 7-(startOffset+daysInMonth)%7;
  for (let i=1; i<=trail; i++) html += `<div class="cal-cell other-month"><span class="cal-day-num">${i}</span></div>`;
  document.getElementById('calGrid').innerHTML = html;
  if (selectedDay) renderDayDetail(selectedDay, visibleTasks, projects, loadAll().users);
}

function selectDay(ds) {
  selectedDay = ds;
  const { tasks, projects, users } = loadAll();
  renderDayDetail(ds, getVisibleTasks(tasks), projects, users);
  renderCalendar();
}

function renderDayDetail(ds, tasks, projects, users) {
  const dayTasks = tasks.filter(t => t.dueDate === ds);
  const detail   = document.getElementById('dayDetail');
  const label    = new Date(ds+'T00:00:00').toLocaleDateString('es-MX',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const sl = { pending:'Pendiente', in_progress:'En Progreso', done:'Terminado' };
  detail.style.display = 'block';
  detail.innerHTML = `<div class="day-detail-title">📅 ${label}${dayTasks.length ? ` · <span style="color:var(--muted);font-weight:400">${dayTasks.length} tarea${dayTasks.length!==1?'s':''}</span>` : ''}</div>
    ${dayTasks.length
      ? dayTasks.map(t => {
          const proj = projects.find(p=>p.id===t.projectId);
          const at   = Array.isArray(t.assignedTo) ? t.assignedTo : (t.assignedTo?[t.assignedTo]:[]);
          const names = at.map(id => users?.find(u=>u.id===id)?.name).filter(Boolean).join(', ');
          return `<div class="detail-task clickable" onclick="window.location.href='kanban.html?p=${t.projectId}&t=${t.id}'" style="cursor:pointer">
            <span class="badge badge-${t.status}">${sl[t.status]}</span>
            <div style="flex:1">
              <div class="detail-task-name">${escHtml(t.name)}</div>
              ${proj  ? `<div class="detail-proj">📁 ${escHtml(proj.name)}</div>` : ''}
              ${names ? `<div class="detail-proj">👤 ${escHtml(names)}</div>` : ''}
            </div>
            <div style="display:flex;align-items:center;gap:.4rem;flex-shrink:0">
              <span class="badge badge-${t.priority}">${{high:'Alta',medium:'Media',low:'Baja'}[t.priority]}</span>
              <span style="color:var(--accent);font-size:.85rem">→</span>
            </div>
          </div>`;
        }).join('')
      : '<div style="color:var(--muted);font-size:.88rem">No hay tareas para este día.</div>'}`;
}
</script>
</body>
</html>
