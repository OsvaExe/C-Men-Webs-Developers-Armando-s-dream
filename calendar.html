<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Calendario</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Navegación de mes */
    .cal-nav {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .cal-month {
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 1.25rem; flex: 1; text-align: center;
      text-transform: capitalize;
    }
    .cal-nav-btn {
      width: 34px; height: 34px; border-radius: var(--radius-sm);
      background: var(--surface); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; transition: all var(--tr);
    }
    .cal-nav-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Grilla */
    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: 1px; background: var(--border);
      border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden;
    }
    .cal-day-header {
      background: var(--surface); padding: .55rem;
      text-align: center; font-size: .72rem; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: .05em;
    }
    .cal-cell {
      background: var(--surface); min-height: 100px;
      padding: .45rem; display: flex; flex-direction: column; gap: .25rem;
    }
    .cal-cell.other-month { background: var(--bg); }
    .cal-cell.today { background: rgba(91,106,240,.06); }
    .cal-day-num {
      font-size: .78rem; font-weight: 600; color: var(--muted);
      width: 22px; height: 22px; display: flex; align-items: center;
      justify-content: center; border-radius: 50%;
    }
    .cal-cell.today .cal-day-num {
      background: var(--accent); color: #fff;
    }

    /* Chips de tarea en celda */
    .cal-task {
      font-size: .7rem; font-weight: 500;
      padding: .15rem .45rem; border-radius: 4px;
      cursor: pointer; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; transition: opacity var(--tr);
      line-height: 1.4;
    }
    .cal-task:hover { opacity: .8; }
    .cal-task.pending  { background: rgba(107,114,144,.2); color: var(--muted); }
    .cal-task.in_progress { background: rgba(91,106,240,.2); color: var(--accent); }
    .cal-task.done     { background: rgba(126,232,162,.2); color: #7ee8a2; }
    .cal-more { font-size: .68rem; color: var(--muted); padding: .1rem .3rem; }

    /* Panel de detalle del día */
    .day-detail {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.25rem 1.5rem;
      margin-top: 1.5rem;
    }
    .day-detail-title { font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; margin-bottom:1rem; }
    .detail-task {
      display: flex; align-items: center; gap: .75rem;
      padding: .65rem .85rem;
      background: var(--surface2); border-radius: var(--radius-sm);
      margin-bottom: .5rem;
    }
    .detail-task-name { flex:1; font-size:.88rem; font-weight:500; }
    .detail-proj { font-size:.75rem; color:var(--muted); }

    /* Leyenda */
    .legend { display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1rem; }
    .legend-item { display:flex; align-items:center; gap:.35rem; font-size:.78rem; color:var(--muted); }
    .legend-dot { width:8px; height:8px; border-radius:2px; }

    @media (max-width:640px) {
      .cal-cell { min-height:70px; }
      .cal-task { display:none; }
      .cal-cell .cal-day-num { font-size:.72rem; }
    }
  </style>
</head>
<body>
<button class="hamburger" id="hamburger">☰</button>

<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><span class="logo-dot"></span>TaskFlow</div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span>Dashboard</a>
      <a href="projects.html"  class="nav-item"><span class="nav-icon">📁</span>Proyectos</a>
      <a href="kanban.html"    class="nav-item"><span class="nav-icon">📋</span>Kanban</a>
      <a href="calendar.html"  class="nav-item"><span class="nav-icon">📅</span>Calendario</a>
      <a href="stats.html"     class="nav-item"><span class="nav-icon">📊</span>Estadísticas</a>
      <div class="nav-divider"></div>
      <a href="settings.html"  class="nav-item"><span class="nav-icon">⚙️</span>Configuración</a>
    </nav>
    <div class="sidebar-bottom">
      <div id="sidebarUser"></div>
      <div class="sb-bottom-row">
        <span class="sidebar-version">v1.0</span>
        <button class="theme-btn" id="themeBtn">🌙</button>
      </div>
    </div>
  </aside>

  <div class="content">
    <header class="page-header">
      <div>
        <h1 class="page-title">Calendario</h1>
        <p class="page-sub">Visualiza tus tareas por fecha de entrega.</p>
      </div>
      <div class="page-actions">
        <button class="btn btn-ghost" id="todayBtn">Hoy</button>
      </div>
    </header>

    <main class="page-main">
      <!-- Leyenda de colores -->
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:rgba(107,114,144,.5)"></div>Pendiente</div>
        <div class="legend-item"><div class="legend-dot" style="background:rgba(91,106,240,.6)"></div>En Progreso</div>
        <div class="legend-item"><div class="legend-dot" style="background:rgba(126,232,162,.6)"></div>Terminado</div>
      </div>

      <!-- Navegación de mes -->
      <div class="cal-nav">
        <button class="cal-nav-btn" id="prevMonth">◀</button>
        <div class="cal-month" id="calMonthLabel"></div>
        <button class="cal-nav-btn" id="nextMonth">▶</button>
      </div>

      <!-- Grilla -->
      <div class="cal-grid" id="calGrid"></div>

      <!-- Detalle del día seleccionado -->
      <div class="day-detail" id="dayDetail" style="display:none"></div>
    </main>
  </div>
</div>

<div id="toastWrap" class="toast-wrap"></div>
<script src="shared.js"></script>
<script>
let viewDate = new Date();
let selectedDay = null;

checkAuth();
seedData();
initTheme();
initNav();
renderCalendar();

document.getElementById('prevMonth').addEventListener('click', () => {
  viewDate.setMonth(viewDate.getMonth() - 1);
  renderCalendar();
});
document.getElementById('nextMonth').addEventListener('click', () => {
  viewDate.setMonth(viewDate.getMonth() + 1);
  renderCalendar();
});
document.getElementById('todayBtn').addEventListener('click', () => {
  viewDate = new Date();
  selectedDay = null;
  document.getElementById('dayDetail').style.display = 'none';
  renderCalendar();
});

function renderCalendar() {
  const { tasks, projects } = loadAll();
  const year  = viewDate.getFullYear();
  const month = viewDate.getMonth();
  const today = new Date().toISOString().slice(0,10);

  // Filtrar tareas según rol
  const visibleTasks = getVisibleTasks(tasks);

  // Encabezado
  document.getElementById('calMonthLabel').textContent =
    new Date(year, month, 1).toLocaleDateString('es-MX', { month:'long', year:'numeric' });

  // Primer día del mes (ajuste: lunes = 0)
  const firstDay = new Date(year, month, 1).getDay();
  const startOffset = (firstDay === 0) ? 6 : firstDay - 1;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrev  = new Date(year, month, 0).getDate();

  // Agrupar tareas por dueDate
  const tasksByDay = {};
  visibleTasks.forEach(t => {
    if (!t.dueDate) return;
    if (!tasksByDay[t.dueDate]) tasksByDay[t.dueDate] = [];
    tasksByDay[t.dueDate].push(t);
  });

  const DAYS = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];

  let html = DAYS.map(d => `<div class="cal-day-header">${d}</div>`).join('');

  // Celdas de días previos
  for (let i = startOffset - 1; i >= 0; i--) {
    html += `<div class="cal-cell other-month"><span class="cal-day-num">${daysInPrev - i}</span></div>`;
  }

  // Celdas del mes actual
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === today;
    const isSel   = dateStr === selectedDay;
    const dayTasks = tasksByDay[dateStr] || [];
    const maxShow = 2;

    const taskChips = dayTasks.slice(0, maxShow).map(t => {
      const proj = projects.find(p => p.id === t.projectId);
      return `<div class="cal-task ${t.status}" title="${escHtml(t.name)} — ${proj?.name||''}">${escHtml(t.name)}</div>`;
    }).join('');
    const more = dayTasks.length > maxShow ? `<div class="cal-more">+${dayTasks.length - maxShow} más</div>` : '';

    html += `
    <div class="cal-cell${isToday?' today':''}${isSel?' today':''}" onclick="selectDay('${dateStr}')" style="cursor:pointer">
      <span class="cal-day-num">${d}</span>
      ${taskChips}${more}
    </div>`;
  }

  // Celdas de días siguientes
  const totalCells = startOffset + daysInMonth;
  const trailingCells = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let i = 1; i <= trailingCells; i++) {
    html += `<div class="cal-cell other-month"><span class="cal-day-num">${i}</span></div>`;
  }

  document.getElementById('calGrid').innerHTML = html;

  // Si hay día seleccionado, volver a mostrar detalle
  if (selectedDay) renderDayDetail(selectedDay, visibleTasks, projects, loadAll().users);
}

function selectDay(dateStr) {
  selectedDay = dateStr;
  const { tasks, projects, users } = loadAll();
  const visibleTasks = getVisibleTasks(tasks);
  renderDayDetail(dateStr, visibleTasks, projects, users);
  renderCalendar();
}

function renderDayDetail(dateStr, tasks, projects, users) {
  // H17: ordenar por fecha (ya están filtrados al mismo día, ordenar por nombre)
  const dayTasks = tasks.filter(t => t.dueDate === dateStr);
  const detail   = document.getElementById('dayDetail');
  const label    = new Date(dateStr + 'T00:00:00').toLocaleDateString('es-MX', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  if (!dayTasks.length) {
    detail.style.display = 'block';
    detail.innerHTML = `
      <div class="day-detail-title">📅 ${label}</div>
      <div style="color:var(--muted);font-size:.88rem">No hay tareas para este día.</div>`;
    return;
  }

  const statusLabel = { pending:'Pendiente', in_progress:'En Progreso', done:'Terminado' };
  detail.style.display = 'block';
  detail.innerHTML = `
    <div class="day-detail-title">📅 ${label} · <span style="color:var(--muted);font-weight:400">${dayTasks.length} tarea${dayTasks.length!==1?'s':''}</span></div>
    ${dayTasks.map(t => {
      const proj = projects.find(p => p.id === t.projectId);
      const assignedTo = Array.isArray(t.assignedTo) ? t.assignedTo : (t.assignedTo ? [t.assignedTo] : []);
      const names = assignedTo.map(id => users?.find(u => u.id === id)?.name).filter(Boolean).join(', ');
      return `
      <div class="detail-task clickable"
           onclick="window.location.href='kanban.html?p=${t.projectId}&t=${t.id}'"
           title="Ir a esta tarea en el Kanban">
        <span class="badge badge-${t.status}">${statusLabel[t.status]}</span>
        <div style="flex:1">
          <div class="detail-task-name">${escHtml(t.name)}</div>
          ${proj ? `<div class="detail-proj">📁 ${escHtml(proj.name)}</div>` : ''}
          ${names ? `<div class="detail-proj">👤 ${escHtml(names)}</div>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:.4rem;flex-shrink:0">
          <span class="badge badge-${t.priority}">${{high:'Alta',medium:'Media',low:'Baja'}[t.priority]}</span>
          <span style="color:var(--accent);font-size:.85rem">→</span>
        </div>
      </div>`;
    }).join('')}`;
}
</script>
</body>
</html>
