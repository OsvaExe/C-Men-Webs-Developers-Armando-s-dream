<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>TaskFlow — Dashboard</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="dashboard.css"/>
</head>
<body>
<button class="hamburger" id="hamburger">☰</button>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><span class="logo-dot"></span>TaskFlow</div>
    <nav class="sidebar-nav">
      <a href="dashboard.html" class="nav-item"><span class="nav-icon">🏠</span>Dashboard</a>
      <a href="projects.html"  class="nav-item"><span class="nav-icon">📁</span>Proyectos</a>
      <a href="kanban.html"    class="nav-item"><span class="nav-icon">📋</span>Kanban</a>
      <a href="calendar.html"  class="nav-item"><span class="nav-icon">📅</span>Calendario</a>
      <a href="stats.html"     class="nav-item"><span class="nav-icon">📊</span>Estadísticas</a>
      <div class="nav-divider"></div>
      <a href="settings.html"  class="nav-item"><span class="nav-icon">⚙️</span>Configuración</a>
    </nav>
    <div class="sidebar-bottom">
      <div id="sidebarUser"></div>
      <div class="sb-bottom-row"><span class="sidebar-version">v1.0</span><button class="theme-btn" id="themeBtn">🌙</button></div>
    </div>
  </aside>
  <div class="content">
    <header class="page-header">
      <div><h1 class="page-title">Dashboard</h1><p class="page-sub" id="greeting">Bienvenido</p></div>
      <div class="page-actions" id="newProjAction">
        <a href="projects.html" class="btn btn-primary">＋ Nuevo Proyecto</a>
      </div>
    </header>
    <main class="page-main">
      <div class="stats-grid" id="statsGrid"></div>
      <div style="margin-bottom:1.75rem">
        <p class="section-title">Acceso rápido</p>
        <div class="quick-actions">
          <a href="projects.html" class="qa-card"><div class="qa-icon">📁</div><div class="qa-label">Proyectos</div></a>
          <a href="kanban.html"   class="qa-card"><div class="qa-icon">📋</div><div class="qa-label">Kanban</div></a>
          <a href="calendar.html" class="qa-card"><div class="qa-icon">📅</div><div class="qa-label">Calendario</div></a>
          <a href="stats.html"    class="qa-card"><div class="qa-icon">📊</div><div class="qa-label">Estadísticas</div></a>
          <a href="settings.html" class="qa-card"><div class="qa-icon">⚙️</div><div class="qa-label">Config</div></a>
        </div>
      </div>
      <div class="dash-grid">
        <div>
          <p class="section-title">Actividad reciente <span style="color:var(--muted);font-size:.78rem;font-weight:400">(tareas en progreso)</span></p>
          <div id="activityList"></div>
        </div>
        <div>
          <p class="section-title">Progreso de proyectos</p>
          <div id="projMiniList"></div>
        </div>
      </div>
    </main>
  </div>
</div>
<div id="toastWrap" class="toast-wrap"></div>
<script src="shared.js"></script>
<script>
checkAuth(); seedData(); initTheme(); initNav();

function render() {
  const { projects, tasks } = loadAll();
  const myTasks    = getVisibleTasks(tasks);
  const myProjects = getVisibleProjects(projects, tasks);

  // Ocultar "Nuevo Proyecto" al miembro
  if (!isAdmin()) document.getElementById('newProjAction').style.display = 'none';

  const h = new Date().getHours();
  document.getElementById('greeting').textContent = (h < 12 ? 'Buenos días' : h < 19 ? 'Buenas tardes' : 'Buenas noches') + ' 👋';

  const total   = myProjects.length;
  const pending = myTasks.filter(t => t.status === 'pending').length;
  const inProg  = myTasks.filter(t => t.status === 'in_progress').length;
  const done    = myTasks.filter(t => t.status === 'done').length;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-icon blue">📁</div><div><div class="stat-value">${total}</div><div class="stat-label">${isAdmin() ? 'Total proyectos' : 'Mis proyectos'}</div></div></div>
    <div class="stat-card"><div class="stat-icon amber">🕐</div><div><div class="stat-value">${pending}</div><div class="stat-label">Tareas pendientes</div></div></div>
    <div class="stat-card"><div class="stat-icon blue">⚡</div><div><div class="stat-value">${inProg}</div><div class="stat-label">En progreso</div></div></div>
    <div class="stat-card"><div class="stat-icon green">✅</div><div><div class="stat-value">${done}</div><div class="stat-label">Completadas</div></div></div>`;

  const actList = document.getElementById('activityList');
  const recent  = myTasks.filter(t => t.status === 'in_progress').slice(0, 6);
  if (!recent.length) {
    actList.innerHTML = '<div class="empty-state" style="padding:2rem"><div class="empty-icon">📭</div><div class="empty-sub">No hay tareas en progreso.</div></div>';
  } else {
    const { users } = loadAll();
    actList.innerHTML = '<div class="activity-list">' + recent.map(t => {
      const proj = projects.find(p => p.id === t.projectId);
      const at   = Array.isArray(t.assignedTo) ? t.assignedTo : [];
      const names = at.map(id => users.find(u => u.id === id)?.name?.split(' ')[0]).filter(Boolean).join(', ');
      return `<div class="activity-item clickable"
           onclick="window.location.href='kanban.html?p=${t.projectId}&t=${t.id}'"
           title="Ir a esta tarea en el Kanban">
        <div class="act-dot" style="background:var(--accent)"></div>
        <div class="act-info">
          <div class="act-name">${escHtml(t.name)}</div>
          <div class="act-proj">${proj ? escHtml(proj.name) : 'Sin proyecto'}${names ? ` · 👤 ${escHtml(names)}` : ''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:.5rem">
          <div class="act-date">${formatDate(t.dueDate)}</div>
          <span style="color:var(--accent);font-size:.78rem">→</span>
        </div>
      </div>`;
    }).join('') + '</div>';
  }

  const projList = document.getElementById('projMiniList');
  if (!myProjects.length) {
    projList.innerHTML = '<div class="empty-state" style="padding:2rem"><div class="empty-icon">📂</div><div class="empty-sub">Sin proyectos aún.</div></div>';
  } else {
    projList.innerHTML = '<div class="proj-mini-list">' + myProjects.map(p => {
      const prog = projectProgress(p.id);
      return `<div class="proj-mini">
        <div class="proj-mini-header">
          <div class="proj-mini-name"><span class="proj-color-dot" style="background:${p.color}"></span>${escHtml(p.name)}</div>
          <div class="proj-mini-pct">${prog.pct}%</div>
        </div>
        <div class="prog-track"><div class="prog-fill" style="width:${prog.pct}%;background:${p.color}"></div></div>
        <div style="font-size:.73rem;color:var(--muted);margin-top:.3rem">${prog.done} de ${prog.total} tareas completadas</div>
      </div>`;
    }).join('') + '</div>';
  }
}
render();
</script>
</body>
</html>
