<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>TaskFlow — Iniciar sesión</title>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="login.css"/>
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo"><span class="logo-dot"></span>TaskFlow</div>
      <div class="login-title">Iniciar sesión</div>
      <div class="login-sub">Ingresa tus credenciales para continuar</div>
    </div>
    <div class="login-body">
      <div class="login-error-box" id="loginError">
        <span>⚠️</span><span id="loginErrorMsg"></span>
      </div>
      <div class="form-group">
        <label class="form-label">Usuario</label>
        <input type="text" id="inputUsername" placeholder="Ej. ana" autocomplete="username" autocapitalize="none" spellcheck="false"/>
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <div class="pass-wrap">
          <input type="password" id="inputPassword" placeholder="••••••••" autocomplete="current-password"/>
          <button class="pass-toggle" id="togglePass" tabindex="-1" type="button">👁</button>
        </div>
      </div>
      <div class="demo-hint">
        💡 <strong>Usuarios de prueba</strong><br>
        Usuario: <strong>ana</strong> &nbsp;·&nbsp; Contraseña: <strong>1234</strong><br>
        Usuario: <strong>luis</strong> &nbsp;·&nbsp; Contraseña: <strong>1234</strong>
      </div>
    </div>
    <div class="login-footer">
      <button class="btn btn-primary" id="loginBtn" style="width:100%;justify-content:center;padding:.7rem;font-size:.92rem">Entrar</button>
    </div>
  </div>
</div>

<div id="toastWrap" class="toast-wrap"></div>
<script src="shared.js"></script>
<script>
  if (getSession()) window.location.href = 'dashboard.html';
  seedData();
  initTheme();
  document.getElementById('themeBtn') && document.getElementById('themeBtn').addEventListener('click', toggleTheme);

  let passVisible = false;
  document.getElementById('togglePass').addEventListener('click', () => {
    passVisible = !passVisible;
    document.getElementById('inputPassword').type = passVisible ? 'text' : 'password';
    document.getElementById('togglePass').textContent = passVisible ? '🙈' : '👁';
  });

  function attemptLogin() {
    const username = document.getElementById('inputUsername').value.trim().toLowerCase();
    const password = document.getElementById('inputPassword').value;
    const errBox   = document.getElementById('loginError');
    const errMsg   = document.getElementById('loginErrorMsg');
    if (!username || !password) { errMsg.textContent = 'Por favor completa todos los campos.'; errBox.classList.add('visible'); return; }
    const { users } = loadAll();
    const user = users.find(u => (u.username || u.name).toLowerCase() === username && u.password === password);
    if (!user) { errMsg.textContent = 'Usuario o contraseña incorrectos.'; errBox.classList.add('visible'); document.getElementById('inputPassword').value = ''; document.getElementById('inputPassword').focus(); return; }
    errBox.classList.remove('visible');
    setSession(user);
    window.location.href = 'dashboard.html';
  }

  document.getElementById('loginBtn').addEventListener('click', attemptLogin);
  ['inputUsername','inputPassword'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });
    document.getElementById(id).addEventListener('input', () => document.getElementById('loginError').classList.remove('visible'));
  });
  document.getElementById('inputUsername').focus();
</script>
</body>
</html>
